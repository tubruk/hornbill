version: '3.8'

services:
  hornbill:
    build:
      context: .
      dockerfile: Dockerfile
    image: hornbill:latest
    container_name: hornbill-app
    ports:
      - "3000:3000"
    volumes:
      # Persists SQLite database, configurations, and uploaded assets on the host
      - ./data/hornbill:/app/data
    environment:
      - PORT=3000
      - TRAILBASE_URL=http://localhost:4000
      - TRAILBASE_DATA_DIR=/app/data
      - SYNC_INTERVAL_MINUTES=60 # Generates next due payments automatically (60 min = 1 hr)
    restart: unless-stopped
