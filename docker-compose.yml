version: '3.8'

services:
  hornbill:
    build:
      context: .
      dockerfile: Dockerfile
    image: hornbill:latest
    container_name: hornbill-app
    ports:
      - "3000:3000"
      - "4000:4000" # Expose Trailbase dashboard locally if needed (optional)
    volumes:
      # Persists SQLite database, configurations, and uploaded assets on the host
      - ./data:/app/packages/db/traildepot
    environment:
      - PORT=3000
      - TRAILBASE_URL=http://localhost:4000
      - SYNC_INTERVAL_MINUTES=1440 # Generates next due payments automatically (1440 min = 24 hrs)
    restart: unless-stopped
