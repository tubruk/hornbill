name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun lint || echo "No lint script defined"

      - name: Type Check
        run: bun run type-check || echo "No type-check script defined"

      - name: Run Tests with Coverage
        run: bun test --coverage --coverage-reporter=lcov

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: chickenzord/hornbill

      - name: Build API
        run: bun --filter api build || echo "No API build script defined"

      - name: Build Web
        run: bun --filter web build || echo "No Web build script defined"
