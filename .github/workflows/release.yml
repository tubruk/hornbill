name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Typecheck
        run: bun run typecheck

      - name: Run Tests
        run: bun test

      - name: Build Standalone Binaries
        run: |
          mkdir -p dist
          # Cross-compile stand-alone binaries using Bun compile
          bun build --compile --target=bun-linux-x64 --minify --sourcemap packages/cli/src/index.ts --outfile dist/hornbill-linux-x64
          bun build --compile --target=bun-linux-arm64 --minify --sourcemap packages/cli/src/index.ts --outfile dist/hornbill-linux-arm64
          bun build --compile --target=bun-darwin-x64 --minify --sourcemap packages/cli/src/index.ts --outfile dist/hornbill-darwin-x64
          bun build --compile --target=bun-darwin-arm64 --minify --sourcemap packages/cli/src/index.ts --outfile dist/hornbill-darwin-arm64
          bun build --compile --target=bun-windows-x64 --minify --sourcemap packages/cli/src/index.ts --outfile dist/hornbill-windows-x64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/hornbill-linux-x64
            dist/hornbill-linux-arm64
            dist/hornbill-darwin-x64
            dist/hornbill-darwin-arm64
            dist/hornbill-windows-x64.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          # 1. Get version from tag
          VERSION=${GITHUB_REF#refs/tags/v}

          # 2. Calculate SHA256 of binaries
          SHA_LINUX_X64=$(sha256sum dist/hornbill-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum dist/hornbill-linux-arm64 | awk '{print $1}')
          SHA_DARWIN_X64=$(sha256sum dist/hornbill-darwin-x64 | awk '{print $1}')
          SHA_DARWIN_ARM64=$(sha256sum dist/hornbill-darwin-arm64 | awk '{print $1}')

          # 3. Clone the tap repository
          git clone https://x-access-token:${TAP_TOKEN}@github.com/tubruk/homebrew-tap.git homebrew-tap
          cd homebrew-tap

          # 4. Generate the formula file
          mkdir -p Formula
          sed -e "s/__VERSION__/${VERSION}/g" \
              -e "s/__SHA_LINUX_X64__/${SHA_LINUX_X64}/g" \
              -e "s/__SHA_LINUX_ARM64__/${SHA_LINUX_ARM64}/g" \
              -e "s/__SHA_DARWIN_X64__/${SHA_DARWIN_X64}/g" \
              -e "s/__SHA_DARWIN_ARM64__/${SHA_DARWIN_ARM64}/g" \
              ../.github/hornbill-cli.rb.template > Formula/hornbill-cli.rb

          # 5. Commit and push the changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hornbill-cli.rb
          git commit -m "feat: release hornbill-cli v$VERSION" || echo "No changes to commit"
          git push origin main

