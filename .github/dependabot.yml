version: 2
updates:
  # Bun dependencies across all workspaces
  - package-ecosystem: "bun"
    directories:
      - "/"
      - "/apps/api"
      - "/apps/web"
      - "/packages/core"
      - "/packages/db"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
